[build-system]
requires = [
    "setuptools>=68",
    "wheel",
    "cmake>=3.18",
    "torch",        # provides libtorch + cmake config at build time
]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "bartorch"
version = "0.1.0.dev0"
description = "PyTorch-native interface to the Berkeley Advanced Reconstruction Toolbox (BART)"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.9"
dependencies = [
    "torch>=2.0",
    "numpy>=1.21",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: C++",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
]

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "pytest-cov",
    "ruff",
    "mypy",
    "pre-commit",
    "nbstripout",
    "codespell",
]
docs = [
    "sphinx>=7.0",
    "furo",
    "nbsphinx",
    "sphinx-copybutton",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["bartorch*"]

# ---------------------------------------------------------------------------
# cmake-build configuration (used by setup.py CMakeExtension)
# ---------------------------------------------------------------------------
[tool.cmake]
# Additional cmake args can be passed via CMAKE_ARGS environment variable.
# e.g.:  CMAKE_ARGS="-DUSE_CUDA=ON" pip install -e .
build_type = "Release"

[tool.black]
line-length = 100
target-version = ["py39"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401"]

[tool.mypy]
python_version = "3.9"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
