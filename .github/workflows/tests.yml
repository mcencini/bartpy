name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -------------------------------------------------------------------------
  # Linux tests — MKL backend (pip install mkl mkl-include)
  # -------------------------------------------------------------------------
  tests-linux:
    name: Tests (Linux, Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y cmake

      - name: Install Python build dependencies
        run: |
          pip install scikit-build-core pybind11 numpy pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install mkl mkl-include

      - name: Build and install bartorch
        run: pip install -e . --no-build-isolation

      - name: Run full test suite
        run: pytest tests/ -v

  # -------------------------------------------------------------------------
  # macOS tests — OpenBLAS + FFTW3 backend (no MKL on ARM64)
  #
  # Uses macos-latest (ARM64 Apple Silicon).  MKL has no ARM64 wheels on PyPI,
  # so the build falls back to Homebrew-installed OpenBLAS + FFTW3.
  # -------------------------------------------------------------------------
  tests-macos:
    name: Tests (macOS, Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies (Homebrew)
        # gcc     — BART's official macOS CI (CC: gcc-mp-14) uses GCC, not Apple
        #            Clang, because Apple Clang 16 cannot handle the recursive MAP
        #            macro in bart/src/bart.c ("pasting formed 'main_(', an invalid
        #            preprocessing token" — a hard preprocessor error, not a warning).
        #            Homebrew GCC handles the macro correctly and supports _Float32
        #            natively (GCC >= 7), avoiding all Apple Clang workarounds.
        # libomp   — OpenMP runtime for FINUFFT C++ spreading (Apple Clang C++
        #            needs Homebrew libomp; GCC C uses its built-in OpenMP).
        # fftw / openblas — required: BARTORCH_USE_ACCELERATE defaults to OFF so
        #            the build uses OpenBLAS (BLAS/LAPACK) + FFTW3 instead of
        #            Apple Accelerate (which lacks LAPACKE and FFTW3 APIs).
        run: |
          brew install cmake libomp fftw openblas gcc
          # Find the Homebrew GCC binary (e.g. gcc-14 or gcc-15) and export it
          # for the build step.  Homebrew installs versioned binaries only;
          # /opt/homebrew/bin/gcc is a symlink to Apple's cc, not Homebrew GCC.
          GCC_BIN=$(ls /opt/homebrew/bin/gcc-* 2>/dev/null | grep -E 'gcc-[0-9]+$' | sort -V | tail -1)
          if [ -z "${GCC_BIN}" ]; then
            echo "ERROR: Homebrew GCC not found in /opt/homebrew/bin. Install with: brew install gcc" >&2
            exit 1
          fi
          echo "BARTORCH_GCC=${GCC_BIN}" >> "$GITHUB_ENV"

      - name: Install Python build dependencies
        run: |
          pip install scikit-build-core pybind11 numpy pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # No mkl/mkl-include on macOS: build uses OpenBLAS + FFTW3 (see above).

      - name: Build and install bartorch
        # Use Homebrew GCC as C compiler (CMAKE_C_COMPILER) to match BART's own
        # macOS CI.  C++ compiler is explicitly set to Apple Clang (clang++) to
        # maintain PyTorch ABI compatibility (PyTorch uses libc++, not libstdc++).
        # FFTW_ROOT / OPENBLAS_ROOT point CMake to the Homebrew installs.
        run: |
          FFTW_PREFIX=$(brew --prefix fftw)
          OPENBLAS_PREFIX=$(brew --prefix openblas)
          CMAKE_ARGS="-DFFTW_ROOT=${FFTW_PREFIX} -DOPENBLAS_ROOT=${OPENBLAS_PREFIX} -DCMAKE_C_COMPILER=${BARTORCH_GCC} -DCMAKE_CXX_COMPILER=$(xcrun -f clang++)" \
            pip install -e . --no-build-isolation

      - name: Run full test suite
        run: pytest tests/ -v

  # -------------------------------------------------------------------------
  # Windows support is deferred.
  #
  # bartorch's shim architecture (mkl_fftw_shim, finufft_grid, torch_prior,
  # cufinufft_grid) relies on the GNU linker's --wrap mechanism to intercept
  # symbol calls at link time.  Windows linkers (link.exe, lld-link) do not
  # support --wrap, making the current architecture fundamentally incompatible
  # with Windows without a major redesign.
  # -------------------------------------------------------------------------

