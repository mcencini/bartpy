name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -------------------------------------------------------------------------
  # Linux tests — MKL backend (pip install mkl mkl-include)
  # -------------------------------------------------------------------------
  tests-linux:
    name: Tests (Linux, Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y cmake

      - name: Install Python build dependencies
        run: |
          pip install scikit-build-core pybind11 numpy pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install mkl mkl-include

      - name: Build and install bartorch
        run: pip install -e . --no-build-isolation

      - name: Run full test suite
        run: pytest tests/ -v

  # -------------------------------------------------------------------------
  # macOS tests — OpenBLAS + FFTW3 backend (no MKL on ARM64)
  #
  # Uses macos-latest (ARM64 Apple Silicon).  MKL has no ARM64 wheels on PyPI,
  # so the build falls back to Homebrew-installed OpenBLAS + FFTW3.
  # -------------------------------------------------------------------------
  tests-macos:
    name: Tests (macOS, Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies (Homebrew)
        # fftw  — single-precision FFTW3 (libfftw3f) used by BART and FINUFFT
        # openblas — CBLAS + LAPACKE used by BART (cblas.h, lapacke.h, libopenblas)
        run: brew install cmake fftw openblas

      - name: Install Python build dependencies
        run: |
          pip install scikit-build-core pybind11 numpy pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # No mkl/mkl-include on macOS: CMakeLists.txt detects OpenBLAS + FFTW3

      - name: Build and install bartorch
        # Pass explicit prefix hints so CMake can find the Homebrew keg-only
        # fftw and openblas formulae (they are not in the default search path).
        run: |
          FFTW_PREFIX=$(brew --prefix fftw)
          OPENBLAS_PREFIX=$(brew --prefix openblas)
          CMAKE_ARGS="-DFFTW_ROOT=${FFTW_PREFIX} -DOPENBLAS_ROOT=${OPENBLAS_PREFIX}" \
            pip install -e . --no-build-isolation

      - name: Run full test suite
        run: pytest tests/ -v

  # -------------------------------------------------------------------------
  # Windows support is deferred.
  #
  # bartorch's shim architecture (mkl_fftw_shim, finufft_grid, torch_prior,
  # cufinufft_grid) relies on the GNU linker's --wrap mechanism to intercept
  # symbol calls at link time.  Windows linkers (link.exe, lld-link) do not
  # support --wrap, making the current architecture fundamentally incompatible
  # with Windows without a major redesign.
  # -------------------------------------------------------------------------

