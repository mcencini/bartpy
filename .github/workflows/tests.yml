name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -------------------------------------------------------------------------
  # Full test suite — builds the C++ extension (BART embedded) and runs all
  # tests.  MKL (from mkl/mkl-include Python packages) provides BLAS and FFT.
  # MKL is detected automatically from torch's install location — no system
  # BLAS or FFTW3 packages required.
  # -------------------------------------------------------------------------
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y cmake

      - name: Install Python build dependencies
        # mkl + mkl-include are bartorch dependencies (pyproject.toml) and are
        # also pulled in transitively by torch on standard PyPI CPU wheels.
        run: |
          pip install scikit-build-core pybind11 numpy pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build and install bartorch (compiles C++ extension with BART)
        run: pip install -e . --no-build-isolation

      - name: Run full test suite
        run: pytest tests/ -v
