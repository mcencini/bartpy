name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -------------------------------------------------------------------------
  # Full test suite — builds the C++ extension (BART embedded) and runs all
  # tests.  MKL (from mkl/mkl-include Python packages) provides BLAS and FFT.
  # MKL is detected automatically from torch's install location — no system
  # BLAS or FFTW3 packages required.
  # -------------------------------------------------------------------------
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install Python build dependencies
        # Using --no-build-isolation means pip will NOT auto-install
        # [build-system].requires, so we install them explicitly here.
        # mkl + mkl-include are declared in pyproject.toml [build-system].requires;
        # torch CPU wheel from the WHL index does not bundle MKL.
        run: |
          pip install scikit-build-core pybind11 numpy pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install mkl mkl-include

      - name: Build and install bartorch (compiles C++ extension with BART)
        run: pip install -e . --no-build-isolation

      - name: Run full test suite
        run: pytest tests/ -v
