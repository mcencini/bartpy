name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -------------------------------------------------------------------------
  # Full test suite — builds the C++ extension (BART embedded) and runs all
  # tests.  The extension is required.
  # Uses MKL (from mkl/mkl-include Python packages) for BLAS and FFT so that
  # no system-level libfftw3-dev or libopenblas-dev is required.
  # -------------------------------------------------------------------------
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y cmake

      - name: Install Python build dependencies (MKL provides BLAS + FFTW3)
        run: |
          pip install scikit-build-core pybind11 numpy pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install mkl mkl-include intel-openmp

      - name: Build and install bartorch (compiles C++ extension with BART)
        run: pip install -e . --no-build-isolation

      - name: Run full test suite
        run: pytest tests/ -v
