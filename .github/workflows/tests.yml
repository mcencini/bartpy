name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install numpy torch pytest scikit-build-core

      - name: Install package
        run: BARTORCH_SKIP_EXT=1 pip install -e . --no-build-isolation

      - name: Run tests
        run: pytest tests/ -v
