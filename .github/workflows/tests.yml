name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -------------------------------------------------------------------------
  # Job 1: pure Python tests (fast, no C++ build, no BART submodule)
  # -------------------------------------------------------------------------
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install numpy torch pytest scikit-build-core

      - name: Install package (skip C++ extension)
        run: BARTORCH_SKIP_EXT=1 pip install -e . --no-build-isolation

      - name: Run tests
        run: pytest tests/ -v

  # -------------------------------------------------------------------------
  # Job 2: C++ extension build + smoke test
  # Checks that the extension compiles and imports cleanly with BART embedded.
  # -------------------------------------------------------------------------
  build-ext:
    name: Build C++ extension (BART embedded)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y cmake libfftw3-dev libopenblas-dev

      - name: Install Python build dependencies
        run: |
          pip install scikit-build-core pybind11 numpy pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build and install bartorch (compiles C++ extension with BART)
        run: pip install -e . --no-build-isolation

      - name: Smoke test — import extension and run pytest ext tests
        run: |
          python - <<'EOF'
          from bartorch import _bartorch_ext
          print("_bartorch_ext imported successfully")
          print(dir(_bartorch_ext))
          EOF
          pytest tests/test_ext.py -v
