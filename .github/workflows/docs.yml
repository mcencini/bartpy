name: Docs (ReadTheDocs)

# This workflow triggers a ReadTheDocs build whenever documentation-relevant
# files are updated on the main branch.
#
# Setup instructions:
# 1. Create an account at https://readthedocs.org and import this repository.
# 2. In your RTD project settings, go to Integrations and copy the webhook URL.
# 3. Add it as a repository secret: Settings → Secrets → READTHEDOCS_WEBHOOK_TOKEN
#    (RTD uses a token in the URL, not a separate header secret).
# 4. Uncomment the "Trigger ReadTheDocs build" step below.
#
# The workflow also validates that the docs build without errors using a local
# Sphinx build on every pull request.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "*.md"
      - "*.rst"
  pull_request:
    branches: [main, develop]
    paths:
      - "docs/**"
      - "src/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -------------------------------------------------------------------------
  # Job 1: validate docs build locally (runs on every PR and push)
  # Notebooks are NOT executed (nbsphinx_execute='never') so the pure-Python
  # package is sufficient — no C++ extension or system libs required.
  # -------------------------------------------------------------------------
  build-docs:
    name: Build Sphinx docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y pandoc

      - name: Install Python build dependencies
        run: |
          pip install scikit-build-core pybind11
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build and install bartorch (pure-Python, no C++ extension)
        run: BARTORCH_SKIP_EXT=1 pip install -e ".[docs]" --no-build-isolation

      - name: Strip pre-committed notebook outputs
        # Clears any stale cell outputs committed to the repo so that
        # nbsphinx_execute=always starts from a clean slate and never
        # generates "image file not readable" warnings from outputs that
        # belong to a previous run.
        run: nbstripout examples/*.ipynb

      - name: Build Sphinx HTML
        run: sphinx-build -W --keep-going -b html docs docs/_build/html

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sphinx-html
          path: docs/_build/html/
          retention-days: 7
